<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendGoogle Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e0e0e0;height:100vh;display:flex}
  .sidebar{width:240px;background:#111118;border-right:1px solid #1e1e2a;padding:24px 16px;display:flex;flex-direction:column;gap:8px}
  .logo{font-size:20px;font-weight:700;color:#fff;margin-bottom:24px;display:flex;align-items:center;gap:10px}
  .logo span{color:#00d4aa}
  .nav-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:#888;transition:all .15s}
  .nav-item:hover,.nav-item.active{background:#1a1a2e;color:#fff}
  .nav-item.active{border-left:3px solid #00d4aa}
  .main{flex:1;padding:32px;overflow-y:auto;max-width:1200px}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
  .header h1{font-size:24px;font-weight:600}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
  .stat-card{background:#14141e;border:1px solid #1e1e2a;border-radius:12px;padding:20px}
  .stat-card .label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px}
  .stat-card .value{font-size:28px;font-weight:700;margin-top:8px}
  .stat-card .value.green{color:#00d4aa}
  .stat-card .value.red{color:#ff4466}
  .stat-card .value.yellow{color:#ffaa44}
  .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .topic-card{background:#14141e;border:1px solid #1e1e2a;border-radius:12px;padding:20px;cursor:pointer;transition:all .15s}
  .topic-card:hover{border-color:#00d4aa44}
  .topic-card .name{font-size:16px;font-weight:600;margin-bottom:4px}
  .topic-card .keywords{font-size:12px;color:#666;margin-bottom:12px}
  .topic-card .metrics{display:flex;gap:16px}
  .topic-card .metric{font-size:13px}
  .topic-card .metric .val{font-weight:600}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
  .tag.stable{background:#00d4aa22;color:#00d4aa}
  .tag.alert{background:#ff446622;color:#ff4466}
  .tag.decay{background:#ffaa4422;color:#ffaa44}
  .btn{background:#00d4aa;color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px}
  .btn:hover{opacity:.85}
  .hidden{display:none!important}
  .status-bar{background:#14141e;border:1px solid #1e1e2a;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#888;display:flex;align-items:center;gap:8px}
  .status-bar .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot.green{background:#00d4aa}
  .dot.red{background:#ff4466}
  .alert-item{display:flex;align-items:center;gap:12px;padding:12px;background:#14141e;border:1px solid #1e1e2a;border-radius:8px;margin-bottom:8px}
  .alert-item .type{font-weight:600}
  .alert-item .time{color:#666;font-size:12px;margin-left:auto}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">&#x1F4C8; <span>TrendGoogle</span></div>
  <div class="nav-item active">&#x1F4CA; Dashboard</div>
  <div class="nav-item">&#x1F50D; Add Topic</div>
  <div class="nav-item">&#x1F514; Alerts</div>
  <div class="nav-item">&#x1F511; API Keys</div>
</div>
<div class="main">
  <div class="header">
    <h1>Dashboard</h1>
    <button class="btn" onclick="addTopic()">+ New Topic</button>
  </div>
  <div class="status-bar" id="statusBar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Loading...</span>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="label">Monitored Topics</div><div class="value" id="totalTopics">--</div></div>
    <div class="stat-card"><div class="label">Active Alerts</div><div class="value yellow" id="activeAlerts">--</div></div>
    <div class="stat-card"><div class="label">Avg AMI</div><div class="value green" id="avgAmi">--</div></div>
    <div class="stat-card"><div class="label">API Calls Today</div><div class="value" id="apiCalls">--</div></div>
  </div>
  <h2 style="margin-bottom:16px">Monitored Topics</h2>
  <div class="topic-grid" id="topicGrid">
    <div style="grid-column:1/-1;text-align:center;color:#666;padding:40px" id="emptyMsg">No data yet.</div>
  </div>
</div>
<script>
const API = '';
let apiKey = localStorage.getItem('tgkey') || '';
const KEY = 'sk_live_'; // partial - will prompt

async function load() {
  // Try to get an API key
  while (!apiKey) {
    const k = prompt('Enter your TrendGoogle API key:');
    if (!k) { 
      // No key - show offline mode
      document.getElementById('statusDot').className = 'dot red';
      document.getElementById('statusText').textContent = 'No API key. Refresh and enter one, or start the daemon first.';
      return;
    }
    apiKey = k;
    localStorage.setItem('tgkey', k);
  }
  const h = {'X-API-Key': apiKey, 'Accept': 'application/json'};
  try {
    const [aR, alR, uR] = await Promise.all([
      fetch(API+'/api/v1/assets', {headers:h}).then(r=>r.ok?r.json():null),
      fetch(API+'/api/v1/alerts?limit=5', {headers:h}).then(r=>r.ok?r.json():null),
      fetch(API+'/api/v1/usage', {headers:h}).then(r=>r.ok?r.json():null)
    ]);
    const assets = aR?.assets || [];
    const alerts = alR || [];
    const usage = uR || {};
    document.getElementById('totalTopics').textContent = assets.length || '0';
    document.getElementById('activeAlerts').textContent = alerts.length || '0';
    document.getElementById('apiCalls').textContent = usage.request_count || '0';
    document.getElementById('statusDot').className = 'dot green';
    document.getElementById('statusText').textContent = 'Connected. API Gateway running on port 8000.';
    if (assets.length === 0) {
      document.getElementById('emptyMsg').textContent = 'No topics yet. Click "+ New Topic" to add one.';
      return;
    }
    let totalAmi = 0;
    let count = 0;
    const grid = document.getElementById('topicGrid');
    grid.innerHTML = '';
    for (const t of assets) {
      try {
        const r = await fetch(API+'/api/v1/momentum/'+t.asset_id, {headers:h});
        const d = await r.json();
        const m = d.metrics || {};
        const ami = m.ami_score_percentage || 0;
        count++; totalAmi += Math.abs(ami);
        const signal = m.signal_class || 'STABLE';
        const tc = signal==='CRITICAL_ALERT'?'alert':signal==='MARKET_DECAY'?'decay':'stable';
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.innerHTML = '<div class="name">'+t.asset_id.replace(/_/g,' ')+' <span class="tag '+tc+'">'+signal+'</span></div>'+
          '<div class="keywords">'+(t.geo||'Worldwide')+'</div>'+
          '<div class="metrics">'+
          '<div class="metric">AMI <span class="val">'+(ami>=0?'+':'')+ami.toFixed(1)+'%</span></div>'+
          '<div class="metric">Updated <span class="val">'+(m.last_update?new Date(m.last_update).toLocaleTimeString():'-')+'</span></div></div>';
        grid.appendChild(card);
      } catch(e) {}
    }
    document.getElementById('avgAmi').textContent = count ? (totalAmi/count).toFixed(1)+'%' : '0.0%';
  } catch(e) {
    document.getElementById('statusDot').className = 'dot red';
    document.getElementById('statusText').textContent = 'Could not connect. Make sure the API gateway is running on port 8000.';
  }
}
function addTopic() {
  const p = prompt('Describe the trend you want to track:');
  if (!p) return;
  const btn = document.querySelector('.btn');
  btn.textContent = 'Analyzing...'; btn.disabled = true;
  fetch(API+'/api/v1/discover', {
    method: 'POST',
    headers: {'Content-Type':'application/json', 'X-API-Key': apiKey},
    body: JSON.stringify({prompt: p})
  }).then(r => r.json()).then(d => {
    btn.textContent = '+ New Topic'; btn.disabled = false;
    if (d.detail) { alert('Error: '+d.detail); return; }
    alert('✅ '+d.topic_name.replace(/_/g,' ')+' added!\n\nKeywords: '+d.keywords.join(', ')+
      '\nVolume: '+(d.analysis?.volume_estimate||'?')+
      '\nStrategy: '+(d.analysis?.suggested_strategy||'—'));
    load();
  }).catch(e => {
    btn.textContent = '+ New Topic'; btn.disabled = false;
    alert('Error: '+e.message);
  });
}
load();
setInterval(load, 30000);
</script>
</body>
</html>
