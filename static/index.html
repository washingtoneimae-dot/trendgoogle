<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendGoogle Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background: #111118;
    border-right: 1px solid #1e1e2a;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .logo {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo span { color: #00d4aa; }
  .nav-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #888;
    transition: all 0.15s;
  }
  .nav-item:hover, .nav-item.active {
    background: #1a1a2e;
    color: #fff;
  }
  .nav-item.active { border-left: 3px solid #00d4aa; }

  /* Main content */
  .main {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
    max-width: 1200px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .header h1 { font-size: 24px; font-weight: 600; }

  /* Cards grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: #14141e;
    border: 1px solid #1e1e2a;
    border-radius: 12px;
    padding: 20px;
  }
  .stat-card .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
  .stat-card .value.green { color: #00d4aa; }
  .stat-card .value.red { color: #ff4466; }
  .stat-card .value.yellow { color: #ffaa44; }

  /* Topic cards */
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .topic-card {
    background: #14141e;
    border: 1px solid #1e1e2a;
    border-radius: 12px;
    padding: 20px;
    transition: all 0.15s;
    cursor: pointer;
  }
  .topic-card:hover { border-color: #00d4aa44; }
  .topic-card .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .topic-card .keywords { font-size: 12px; color: #666; margin-bottom: 12px; }
  .topic-card .metrics {
    display: flex;
    gap: 16px;
  }
  .topic-card .metric { font-size: 13px; }
  .topic-card .metric .val { font-weight: 600; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .tag.stable { background: #00d4aa22; color: #00d4aa; }
  .tag.alert { background: #ff446622; color: #ff4466; }
  .tag.decay { background: #ffaa4422; color: #ffaa44; }

  /* Alert list */
  .alert-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: #14141e;
    border: 1px solid #1e1e2a;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .alert-item .type { font-weight: 600; }
  .alert-item .time { color: #666; font-size: 12px; margin-left: auto; }
  .alert-item .score { font-weight: 700; }
  .alert-item .score.spike { color: #00d4aa; }
  .alert-item .score.decline { color: #ff4466; }

  .btn {
    background: #00d4aa;
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-secondary {
    background: transparent;
    border: 1px solid #1e1e2a;
    color: #e0e0e0;
  }
  .btn:hover { opacity: 0.85; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">📈 <span>TrendGoogle</span></div>
  <div class="nav-item active">📊 Dashboard</div>
  <div class="nav-item">🔍 Add Topic</div>
  <div class="nav-item">🔔 Alerts</div>
  <div class="nav-item">🔑 API Keys</div>
  <div class="nav-item">⚙️ Settings</div>
  <div style="margin-top: auto;">
    <div class="nav-item" onclick="openTrendfinder()">🤖 Trendfinder Chat</div>
  </div>
</div>

<!-- Main content -->
<div class="main">
  <div class="header">
    <h1>Dashboard</h1>
    <button class="btn" onclick="openTrendfinder()">+ New Topic</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Monitored Topics</div>
      <div class="value" id="totalTopics">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Active Alerts</div>
      <div class="value yellow" id="activeAlerts">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Avg AMI</div>
      <div class="value green" id="avgAmi">0.0%</div>
    </div>
    <div class="stat-card">
      <div class="label">API Calls Today</div>
      <div class="value" id="apiCalls">0</div>
    </div>
  </div>

  <!-- Topic cards -->
  <h2 style="margin-bottom: 16px;">Monitored Topics</h2>
  <div class="topic-grid" id="topicGrid">
    <div style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px;">No topics yet. Click "+ New Topic" to add one.</div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:8000';
let apiKey = localStorage.getItem('trendgoogle_api_key') || '';

function getHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (apiKey) h['X-API-Key'] = apiKey;
  return h;
}

async function loadDashboard() {
  if (!apiKey) {
    apiKey = prompt('Enter your API key:');
    if (apiKey) localStorage.setItem('trendgoogle_api_key', apiKey);
    else return;
  }

  try {
    // Load assets
    const assetsRes = await fetch(`${API_BASE}/api/v1/assets`, { headers: getHeaders() });
    const assets = await assetsRes.json();
    const topics = assets.assets || [];
    document.getElementById('totalTopics').textContent = topics.length;

    // Load alerts
    const alertsRes = await fetch(`${API_BASE}/api/v1/alerts?limit=5`, { headers: getHeaders() });
    const alerts = await alertsRes.json();

    // Load usage
    const usageRes = await fetch(`${API_BASE}/api/v1/usage`, { headers: getHeaders() });
    const usage = await usageRes.json();

    document.getElementById('activeAlerts').textContent = alerts.length;
    document.getElementById('apiCalls').textContent = usage.request_count || 0;

    // Render topics
    const grid = document.getElementById('topicGrid');
    grid.innerHTML = '';

    if (topics.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px;">No topics yet. Click "+ New Topic" to add one.</div>';
      return;
    }

    let totalAmi = 0;
    for (const t of topics) {
      try {
        const res = await fetch(`${API_BASE}/api/v1/momentum/${t.asset_id}`, { headers: getHeaders() });
        const data = await res.json();
        const m = data.metrics || {};
        const ami = m.ami_score_percentage || 0;
        totalAmi += Math.abs(ami);
        const signal = m.signal_class || 'STABLE';
        const tagClass = signal === 'CRITICAL_ALERT' ? 'alert' : signal === 'MARKET_DECAY' ? 'decay' : 'stable';

        const card = document.createElement('div');
        card.className = 'topic-card';
        card.innerHTML = `
          <div class="name">${t.asset_id.replace(/_/g, ' ')} <span class="tag ${tagClass}">${signal}</span></div>
          <div class="keywords">${t.geo || 'Worldwide'}</div>
          <div class="metrics">
            <div class="metric">AMI <span class="val">${ami >= 0 ? '+' : ''}${ami.toFixed(1)}%</span></div>
            <div class="metric">Updated <span class="val">${m.last_update ? new Date(m.last_update).toLocaleTimeString() : '-'}</span></div>
          </div>
        `;
        grid.appendChild(card);
      } catch(e) {
        console.log('Error loading', t.asset_id, e);
      }
    }
    document.getElementById('avgAmi').textContent = topics.length ? (totalAmi / topics.length).toFixed(1) + '%' : '0.0%';

  } catch(e) {
    console.error('Dashboard load error:', e);
    alert('Could not connect to API. Make sure the API gateway is running on port 8000.');
  }
}

function openTrendfinder() {
  const prompt = prompt('Describe the trend you want to track:');
  if (!prompt) return;
  alert(`Trendfinder would analyze: "${prompt}"\n\n(API key needed in trendfinder.py — use the terminal for now)`);
  // Future: POST to a new /api/v1/discover endpoint
}

loadDashboard();
setInterval(loadDashboard, 30000); // Refresh every 30s
</script>
</body>
</html>
